<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Football 🤖 Predictions</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Monetag -->
<script src="//libtl.com/sdk.js"
  data-zone="10317085"
  data-sdk="show_10317085"></script>

<style>

body{
  margin:0;
  background:#061f18;
  font-family:system-ui;
  color:#fff;
}

header{
  background:linear-gradient(90deg,#014421,#065f46);
  padding:16px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  border-bottom:2px solid #facc15;
}

.container{padding:12px;}

.card{
  background:#022c22;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  border:1px solid #14532d;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
  position:relative;
}

.hot{
  position:absolute;
  top:10px;
  right:10px;
  background:#ef4444;
  padding:4px 8px;
  font-size:11px;
  border-radius:6px;
}

.match{text-align:center;font-weight:bold;}
.vs{color:#ef4444;}

.status{text-align:center;margin-top:5px;}
.live{color:#ef4444;}
.upcoming{color:#facc15;}

.live-dot{
  width:8px;height:8px;background:red;border-radius:50%;
  display:inline-block;animation:blink 1s infinite;
}

@keyframes blink{50%{opacity:0}}

.odds{text-align:center;margin-top:6px;color:#22c55e;}

.progress{
  margin-top:10px;
  background:#111;
  border-radius:10px;
  height:8px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  background:#22c55e;
  width:0%;
  transition:1s;
}

.prediction{
  display:none;
  text-align:center;
  margin-top:10px;
  color:#facc15;
  font-weight:bold;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.bet{
  flex:1;
  background:#16a34a;
  padding:10px;
  text-align:center;
  border-radius:8px;
  text-decoration:none;
  color:#fff;
}

.watch{
  flex:1;
  background:#facc15;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

/* POPUP WINNER */
.popup{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#022c22;
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;
  box-shadow:0 4px 10px rgba(0,0,0,0.5);
  animation:fadeInOut 6s infinite;
}

@keyframes fadeInOut{
  0%{opacity:0;transform:translateY(20px)}
  20%{opacity:1}
  80%{opacity:1}
  100%{opacity:0;transform:translateY(20px)}
}

/* ACTIVITY BAR */
.activity{
  position:fixed;
  top:0;
  width:100%;
  background:#16a34a;
  text-align:center;
  font-size:12px;
  padding:4px;
}

</style>
</head>

<body>

<div class="activity" id="activityBar">
🔥 Someone just placed a bet...
</div>

<header>AI Football 🤖 Predictions</header>

<div class="container">

<div class="card">
<div class="hot">🔥 HOT</div>

<div class="match">
MAN CITY <span class="vs">VS</span> WEST HAM
</div>

<div class="status live">
<span class="live-dot"></span> LIVE
</div>

<div class="odds">💰 Odds: 2.45</div>

<div class="progress">
<div class="progress-bar" data-width="78%"></div>
</div>

<div class="prediction">HOME WIN (98%)</div>

<div class="buttons">
<a class="bet" href="https://omg10.com/4/8729428">BET NOW</a>
<button class="watch" onclick="unlockPrediction(this)">SEE PREDICTION</button>
</div>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
💰 John from Lagos just won ₦70,000
</div>

<script>

/* FIXED UNLOCK (NO MORE ERROR) */
function unlockPrediction(btn){
  const card = btn.closest('.card');
  const pred = card.querySelector('.prediction');
  const bar = card.querySelector('.progress-bar');

  btn.textContent = "Loading...";

  // Try ad but don't depend on it
  try{
    show_10317085().catch(()=>{});
  }catch(e){}

  setTimeout(()=>{
    pred.style.display="block";
    bar.style.width=bar.dataset.width;
    btn.style.display="none";
  },3000);
}

/* AUTO PROGRESS */
window.onload = ()=>{
  document.querySelectorAll('.progress-bar').forEach(bar=>{
    setTimeout(()=>{
      bar.style.width = bar.dataset.width;
    },1000);
  });
}

/* FAKE WINNER POPUP */
const names = ["John","David","Michael","Samuel","Chris"];
const cities = ["Lagos","Abuja","Port Harcourt","Ibadan"];
const amounts = ["₦20,000","₦50,000","₦100,000"];

setInterval(()=>{
  const popup = document.getElementById("popup");
  const name = names[Math.floor(Math.random()*names.length)];
  const city = cities[Math.floor(Math.random()*cities.length)];
  const amount = amounts[Math.floor(Math.random()*amounts.length)];

  popup.textContent = `💰 ${name} from ${city} just won ${amount}`;
},6000);

/* ACTIVITY BAR */
const activityText = [
"🔥 2498 users viewing now",
"⚡ 270 bets placed in last minute",
"💰 High winning chance today",
"📈 Odds increasing fast"
];

setInterval(()=>{
  document.getElementById("activityBar").textContent =
  activityText[Math.floor(Math.random()*activityText.length)];
},4000);

/* AUTO REFRESH */
setTimeout(()=>{
  location.reload();
},1800000); // 30 mins

</script>

</body>
</html>
