<div class="match-card">

  <!-- Header -->
  <div class="card-header">
    <div class="upcoming">
      <span>🕒 UPCOMING</span>

    </div>
  </div>

  <!-- Teams -->
  <div class="match-row">

           class="team-logo" alt="Mallorca">
      <div class="team-name">Mallorca</div>
    </div>

    <div class="center">
      <div class="vs">VS</div>
      <div class="odds-box">
        <span>Odds</span>

      </div>
    </div>

    <div class="team">
      <img src="https://upload.wikimedia.org/wikipedia/en/5/53/Real_Madrid_CF.svg" 
           class="team-logo" alt="Real Madrid">
