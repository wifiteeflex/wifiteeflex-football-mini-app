<style>
  :root {
    --bg: #0a1f1a;
    --card: #112c26;
    --green: #22c55e;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
    padding-bottom: 20px;
  }

  header {
    background: #0a1f1a;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #14532d;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-title {
    font-size: 20px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tabs {
    display: flex;
    background: #112c26;
    margin: 12px 16px;
    border-radius: 12px;
    padding: 4px;
    overflow-x: auto;
  }

  .tab {
    flex: 1;
    padding: 10px 12px;
    text-align: center;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
  }

  .tab.active {
    background: #14532d;
    color: #fff;
  }

  .container { padding: 0 16px; }

  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    border: 1px solid #14532d;
    position: relative;
  }

  .league {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    margin-bottom: 12px;
  }

  .status {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 12px;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .live { background: #ef4444; }
  .upcoming { background: #eab308; color: #000; }

  .hot {
    position: absolute;
    top: 16px;
    right: 80px;
    background: #ef4444;
    color: white;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: bold;
  }

  .vip {
    position: absolute;
    top: 16px;
    left: 16px;
    background: #7c3aed;
    color: white;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: bold;
  }

  .match-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 16px 0;
  }

  .team {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .team-logo {
    width: 60px;
    height: 60px;
    object-fit: contain;
    margin-bottom: 8px;
  }

  .vs {
    font-size: 18px;
    font-weight: bold;
    color: #ef4444;
    padding: 0 12px;
  }

  .odds {
    background: #1f3a32;
    padding: 6px 12px;
    border-radius: 8px;
    text-align: center;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-weight: 600;
  }

  .confidence {
    margin-top: 12px;
  }

  .confidence-bar {
    height: 6px;
    background: #1f3a32;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 6px;
  }

  .confidence-fill {
    height: 100%;
    background: linear-gradient(90deg, #22c55e, #86efac);
    width: 0%;
    transition: width 1.5s ease;
  }

  .ai-prediction {
    background: #1a2f28;
    border-radius: 10px;
    padding: 10px;
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 600;
  }

  .buttons {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  .bet-btn {
    flex: 1;
    background: #16a34a;
    color: white;
    padding: 14px;
    border-radius: 10px;
    text-align: center;
    font-weight: 700;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .predict-btn {
    flex: 1;
    background: #facc15;
    color: #000;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .prediction {
    display: none;
    margin-top: 12px;
    color: #facc15;
    font-size: 17px;
    font-weight: 700;
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <span>☰</span>
    <span>AI Football 🤖 Predictions</span>
  </div>
  <span>🔔</span>
</header>

<div class="powered" style="text-align:center; color:#22c55e; font-size:13px; padding:6px 0; background:#112c26;">
  ● Powered by AI Engine
</div>

<div class="tabs">
  <div class="tab active">⚽ All Matches</div>
  <div class="tab">🔴 Live</div>
  <div class="tab">⏰ Upcoming</div>
  <div class="tab">👑 VIP Picks</div>
</div>

<div class="container">

  <!-- LIVE MATCH -->
  <div class="card">
    <div class="hot">🔥 HOT</div>
    <div class="league">
      <span>🇪🇸</span> La Liga
    </div>
    <div class="status live">LIVE</div>

    <div class="match-container">
      <div class="team">
        <img src="https://upload.wikimedia.org/wikipedia/en/8/8a/Real_Sociedad_logo.svg" class="team-logo" alt="Real Sociedad">
        <div>Real Sociedad</div>
      </div>
      <div style="position:relative; flex:0 0 80px;">
        <div class="odds">Odds<br><strong>1.62</strong></div>
        <div class="vs">VS</div>
      </div>
      <div class="team">
        <img src="https://upload.wikimedia.org/wikipedia/en/6/6a/Levante_UD_logo.svg" class="team-logo" alt="Levante">
        <div>Levante</div>
      </div>
    </div>

    <div class="confidence">
      <div style="display:flex; justify-content:space-between; font-size:13px;">
        <span>AI Confidence</span>
        <span>65%</span>
      </div>
      <div class="confidence-bar"><div class="confidence-fill" data-width="65%"></div></div>
    </div>

    <div class="buttons">
      <a class="bet-btn" href="https://omg10.com/4/8859017">↑ BET NOW</a>
      <button class="predict-btn" onclick="unlockPrediction(this)">🔒 SEE PREDICTION</button>
    </div>
  </div>

  <!-- UPCOMING - Mallorca vs Real Madrid -->
  <div class="card">
    <div class="league">
      <span>🇪🇸</span> La Liga
    </div>
    <div class="status upcoming">UPCOMING</div>

    <div class="match-container">
      <div class="team">
        <img src="https://upload.wikimedia.org/wikipedia/en/6/6a/RCD_Mallorca_logo.svg" class="team-logo" alt="Mallorca">
        <div>Mallorca</div>
      </div>
      <div style="position:relative; flex:0 0 80px;">
        <div class="odds">Odds<br><strong>1.60</strong></div>
        <div class="vs">VS</div>
      </div>
      <div class="team">
        <img src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg" class="team-logo" alt="Real Madrid">
        <div>Real Madrid</div>
      </div>
    </div>

    <div class="confidence">
      <div style="display:flex; justify-content:space-between; font-size:13px;">
        <span>AI Confidence</span>
        <span>62%</span>
      </div>
      <div class="confidence-bar"><div class="confidence-fill" data-width="62%"></div></div>
    </div>

    <div class="buttons">
      <a class="bet-btn" href="https://omg10.com/4/8859017">↑ BET NOW</a>
      <button class="predict-btn" onclick="unlockPrediction(this)">🔒 SEE PREDICTION</button>
    </div>
  </div>

  <!-- Add more cards following the same pattern -->

</div>

<script>
// Unlock function
function unlockPrediction(btn) {
  const card = btn.closest('.card');
  const pred = card.querySelector('.prediction') || document.createElement('div');
  pred.className = 'prediction';
  pred.innerHTML = 'BTTS (YES) <strong>86%</strong>';
  card.appendChild(pred);

  btn.disabled = true;
  btn.innerHTML = '🔄 ANALYZING...';

  show_10317085().then(() => {
    setTimeout(() => {
      pred.style.display = "block";
      const bar = card.querySelector('.confidence-fill');
      if (bar) bar.style.width = bar.dataset.width;
      btn.style.display = "none";
    }, 2200);
  }).catch(() => {
    alert("Ad failed. Try again.");
    btn.disabled = false;
    btn.innerHTML = '🔒 SEE PREDICTION';
  });
}

// Animate bars
window.onload = () => {
  document.querySelectorAll('.confidence-fill').forEach(bar => {
    setTimeout(() => bar.style.width = bar.dataset.width, 600);
  });
};
</script>

</body>
