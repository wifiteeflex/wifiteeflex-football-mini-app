<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Football Predictions</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#001d16;
color:#fff;
}

/* HEADER */

.topbar{
background:linear-gradient(180deg,#015c31,#012e1f);
padding:20px 15px 15px;
text-align:center;
position:sticky;
top:0;
z-index:999;
border-bottom:1px solid rgba(255,255,255,.1);
}

.title{
font-size:28px;
font-weight:800;
line-height:1.2;
}

.powered{
margin-top:8px;
font-size:14px;
color:#d1fae5;
}

.powered span{
color:#00ff66;
}

/* TABS */

.tabs{
display:flex;
justify-content:space-around;
align-items:center;
padding:14px 8px;
background:#01271d;
border-bottom:1px solid rgba(255,255,255,.08);
}

.tab{
color:#cbd5e1;
font-size:15px;
font-weight:600;
}

.active-tab{
color:#00ff66;
border-bottom:3px solid #00ff66;
padding-bottom:10px;
}

/* CONTAINER */

.container{
padding:12px;
}

/* CARD */

.card{
background:linear-gradient(180deg,#021f18,#01150f);
border-radius:24px;
padding:15px;
margin-bottom:18px;
border:1px solid rgba(0,255,100,.12);
box-shadow:0 0 20px rgba(0,255,120,.06);
}

/* CARD TOP */

.card-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.left-info{
display:flex;
align-items:center;
gap:8px;
}

.live{
background:#dc2626;
padding:6px 10px;
border-radius:10px;
font-size:13px;
font-weight:700;
}

.upcoming{
color:#facc15;
font-weight:700;
font-size:15px;
}

.league{
color:#d1d5db;
font-size:14px;
}

.hot{
background:#ea580c;
padding:6px 10px;
border-radius:10px;
font-size:13px;
font-weight:700;
}

/* TEAMS */

.match-area{
display:flex;
justify-content:space-between;
align-items:center;
text-align:center;
margin-top:10px;
}

.team{
width:35%;
}

.team img{
width:85px;
height:85px;
object-fit:contain;
}

.team-name{
margin-top:8px;
font-size:16px;
font-weight:700;
}

/* CENTER */

.center{
width:30%;
}

.minute{
color:#00ff66;
font-size:24px;
font-weight:800;
}

.vs{
font-size:40px;
font-weight:900;
margin:5px 0;
}

.odds-box{
background:#06281d;
border:1px solid rgba(255,255,255,.08);
border-radius:14px;
padding:10px;
width:90px;
margin:auto;
}

.odds-box span{
display:block;
font-size:14px;
color:#d1d5db;
}

.odds-box strong{
font-size:18px;
color:#00ff66;
}

/* CONFIDENCE */

.confidence{
margin-top:18px;
}

.conf-top{
display:flex;
justify-content:space-between;
margin-bottom:8px;
font-size:15px;
}

.progress{
height:10px;
background:#0f172a;
border-radius:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:linear-gradient(90deg,#00ff66,#22c55e);
border-radius:20px;
}

/* BUTTONS */

.buttons{
display:flex;
gap:12px;
margin-top:18px;
}

.bet-btn{
flex:1;
background:linear-gradient(90deg,#0d7a38,#16a34a);
padding:15px;
border-radius:14px;
text-align:center;
font-size:16px;
font-weight:800;
text-decoration:none;
color:#fff;
}

.predict-btn{
flex:1;
background:#facc15;
border:none;
border-radius:14px;
font-size:16px;
font-weight:800;
}

/* VIP */

.vip-card{

}
