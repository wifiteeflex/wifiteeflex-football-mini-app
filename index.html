<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn Quiz 💰</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle,#0a0a23,#000);
  color:white;
  text-align:center;
}

.container {padding:20px;max-width:500px;margin:auto;}

.top-bar {
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

.button {
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:black;
  font-weight:bold;
}

/* SPIN WHEEL */
.wheel-container {
  position:relative;
  width:250px;
  height:250px;
  margin:20px auto;
}

#wheel {
  width:100%;
  height:100%;
  border-radius:50%;
  border:5px solid gold;
  transition: transform 4s ease-out;
}

.pointer {
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:20px solid red;
}

/* SECTIONS */
.section {display:none;}
.active {display:block;}

.card {
  background:#1c1c1c;
  padding:15px;
  border-radius:15px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="top-bar">
    <div>💰 Coins: <span id="coins">0</span></div>
    <div>🔥 Level: <span id="level">1</span></div>
  </div>

  <!-- MENU -->
  <div>
    <button class="button" onclick="showSection('quiz')">🎮 Quiz</button>
    <button class="button" onclick="showSection('spin')">🎰 Spin</button>
    <button class="button" onclick="showSection('daily')">🎁 Daily</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="section active">
    <div class="card">
      <h3 id="question">Loading...</h3>
      <div id="answers"></div>
      <p id="message"></p>
    </div>
  </div>

  <!-- SPIN -->
  <div id="spin" class="section">
    <div class="card">
      <h3>🎰 Spin & Win</h3>

      <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="250" height="250"></canvas>
      </div>

      <button class="button" onclick="spin()">SPIN</button>
      <p id="spinResult"></p>
    </div>
  </div>

  <!-- DAILY -->
  <div id="daily" class="section">
    <div class="card">
      <h3>🎁 Daily Reward</h3>
      <p id="dailyText">Claim reward</p>
      <button class="button" onclick="claimDaily()">CLAIM</button>
    </div>
  </div>

</div>

<script>
// ---------------- BASIC ----------------
let coins = 0;
let level = 1;

// ---------------- SWITCH ----------------
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ---------------- QUIZ ----------------
const questions = [
  {q:"2+2=?", a:["3","4","5","6"], c:1},
  {q:"Capital of France?", a:["Berlin","Paris","Rome","Madrid"], c:1}
];

let current = 0;

function loadQ(){
  let q = questions[current];
  document.getElementById("question").innerText = q.q;

  let html="";
  q.a.forEach((opt,i)=>{
    html += `<button class="button" onclick="check(${i})">${opt}</button>`;
  });
  document.getElementById("answers").innerHTML = html;
}

function check(i){
  let q = questions[current];

  if(i===q.c){
    coins += 10;
    level++;
    document.getElementById("coins").innerText = coins;
    document.getElementById("level").innerText = level;
    document.getElementById("message").innerText="🔥 Correct!";
    current = (current+1)%questions.length;
    setTimeout(loadQ,1000);
  } else {
    document.getElementById("message").innerHTML=
    `❌ Wrong! <br>
    <button class="button" onclick="watchAd()">Watch Ad</button>
    <button class="button" onclick="reset()">Restart</button>`;
  }
}

// ---------------- SPIN WHEEL ----------------
const wheel = document.getElementById("wheel");
const ctx = wheel.getContext("2d");

const rewards = [10,20,50,100,0,200];
const colors = ["#f44336","#ff9800","#ffc107","#4caf50","#2196f3","#9c27b0"];

function drawWheel(){
  let angle = 2*Math.PI / rewards.length;

  rewards.forEach((r,i)=>{
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(125,125);
    ctx.arc(125,125,125,i*angle,(i+1)*angle);
    ctx.fill();

    ctx.fillStyle="#fff";
    ctx.fillText(r,110,30 + i*30);
  });
}
drawWheel();

let spinning = false;

function spin(){
  if(spinning) return;
  spinning = true;

  let spinDeg = Math.floor(3000 + Math.random()*2000);
  wheel.style.transform = `rotate(${spinDeg}deg)`;

  setTimeout(()=>{
    spinning = false;
    let reward = rewards[Math.floor(Math.random()*rewards.length)];

    if(reward===0){
      document.getElementById("spinResult").innerText="😢 Try again!";
    } else {
      coins += reward;
      document.getElementById("coins").innerText=coins;
      document.getElementById("spinResult").innerText="🎉 Won "+reward+" coins!";
    }

    showAd();
  },4000);
}

// ---------------- DAILY ----------------
function claimDaily(){
  let last = localStorage.getItem("daily");
  let now = Date.now();

  if(last && now - last < 86400000){
    document.getElementById("dailyText").innerText="⏳ Come tomorrow";
    return;
  }

  coins += 100;
  document.getElementById("coins").innerText=coins;
  document.getElementById("dailyText").innerText="🎉 +100 coins!";
  localStorage.setItem("daily",now);

  showAd();
}

// ---------------- ADS ----------------
function showAd(){
  (function(s){
    s.dataset.zone='10331171';
    s.src='https://gizokraijaw.net/vignette.min.js';
  })(document.body.appendChild(document.createElement('script')));
}

function watchAd(){
  showAd();
  setTimeout(loadQ,3000);
}

// ---------------- RESET ----------------
function reset(){
  coins = 0;
  level = 1;
  document.getElementById("coins").innerText=coins;
  document.getElementById("level").innerText=level;
  loadQ();
}

// ---------------- START ----------------
loadQ();
</script>

</body>
      </html>
