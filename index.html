<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Football 🤖 Swipe Predictions</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="//libtl.com/sdk.js"
data-zone="10317085"
data-sdk="show_10317085"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#020f17;
font-family:Arial;
color:#fff;
overflow:hidden;
}

/* ===== STICKY HEADER ===== */
header{
position:fixed;
top:0;
left:0;
right:0;
height:70px;
background:linear-gradient(180deg,#061c28,#031018);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
border-bottom:1px solid rgba(255,255,255,.05);
}

header h1{
font-size:18px;
font-weight:900;
}

header small{
color:#2cff88;
font-weight:700;
margin-top:2px;
}

/* ===== SWIPE CONTAINER ===== */
.feed{
position:absolute;
top:70px;
bottom:0;
left:0;
right:0;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

/* ===== CARD (FULL SCREEN LIKE TIKTOK) ===== */
.card{
height:calc(100vh - 70px);
scroll-snap-align:start;
display:flex;
flex-direction:column;
justify-content:space-between;
padding:20px 15px;
background:linear-gradient(180deg,#061826,#020c12);
border-bottom:1px solid rgba(255,255,255,.03);
}

/* ===== TOP INFO ===== */
.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.badge{
padding:6px 12px;
border-radius:10px;
font-size:11px;
font-weight:900;
}

.live{background:#ff3b3b;}
.upcoming{background:#ffcc00;color:#000;}
.hot{background:#ff7b00;}

/* ===== TEAMS ===== */
.match{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

.team{
text-align:center;
width:35%;
}

.logo{
width:75px;
height:75px;
border-radius:50%;
background:#0f2230;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
margin:auto;
border:2px solid rgba(255,255,255,.06);
}

.logo img{
width:80%;
height:80%;
object-fit:contain;
}

.team-name{
margin-top:10px;
font-size:14px;
font-weight:800;
}

/* VS CENTER */
.center{
text-align:center;
width:30%;
}

.vs{
font-size:38px;
font-weight:900;
margin:10px 0;
}

.odds{
background:#0f2230;
padding:10px;
border-radius:14px;
font-size:12px;
}

.odds strong{
display:block;
font-size:22px;
color:#1cff84;
}

/* ===== CONFIDENCE ===== */
.confidence{
margin-top:20px;
}

.bar{
height:10px;
background:#10212e;
border-radius:20px;
overflow:hidden;
margin-top:6px;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff73,#1aff95);
transition:1s;
}

.percent{
text-align:right;
font-size:12px;
color:#1cff84;
margin-top:5px;
}

/* ===== BUTTONS ===== */
.buttons{
display:flex;
gap:10px;
margin-top:20px;
}

.bet{
flex:1;
height:50px;
border-radius:14px;
background:linear-gradient(90deg,#0e8f39,#1ed760);
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
text-decoration:none;
color:#fff;
}

.watch{
flex:1;
height:50px;
border-radius:14px;
background:#ffcf0a;
border:none;
font-weight:900;
}

.pred{
display:none;
margin-top:15px;
text-align:center;
font-weight:900;
color:#ffd54a;
font-size:16px;
}

</style>
</head>

<body>

<header>
<h1>AI Football Predictions</h1>
<small>Swipe for next match ↑↓</small>
</header>

<div class="feed">

<!-- CARD 1 -->
<div class="card">

<div class="top">
<div class="badge live">LIVE 15'</div>
<div class="badge hot">🔥 HOT</div>
</div>

<div class="match">

<div class="team">
<div class="logo">
<img src="https://upload.wikimedia.org/wikipedia/en/8/81/Real_Sociedad_logo.svg">
</div>
<div class="team-name">Real Sociedad</div>
</div>

<div class="center">
<div class="vs">VS</div>
<div class="odds">Odds <strong>1.62</strong></div>
</div>

<div class="team">
<div class="logo">
<img src="https://upload.wikimedia.org/wikipedia/en/6/6a/Levante_UD_logo.svg">
</div>
<div class="team-name">Levante</div>
</div>

</div>

<div class="confidence">
<div>AI Confidence</div>
<div class="bar"><div class="fill" data-width="65%"></div></div>
<div class="percent">65%</div>
</div>

<div class="pred">🏆 HOME WIN (85%)</div>

<div class="buttons">
<a class="bet" href="https://omg10.com/4/8859017">BET NOW</a>
<button class="watch" onclick="unlock(this)">SEE</button>
</div>

</div>

<!-- CARD 2 -->
<div class="card">

<div class="top">
<div class="badge upcoming">UPCOMING</div>
</div>

<div class="match">

<div class="team">
<div class="logo">
<img src="https://upload.wikimedia.org/wikipedia/en/7/70/RCD_Mallorca_logo.svg">
</div>
<div class="team-name">Mallorca</div>
</div>

<div class="center">
<div class="vs">VS</div>
<div class="odds">Odds <strong>1.60</strong></div>
</div>

<div class="team">
<div class="logo">
<img src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg">
</div>
<div class="team-name">Real Madrid</div>
</div>

</div>

<div class="confidence">
<div>AI Confidence</div>
<div class="bar"><div class="fill" data-width="62%"></div></div>
<div class="percent">62%</div>
</div>

<div class="pred">⚽ OVER 1.5 (100%)</div>

<div class="buttons">
<a class="bet" href="https://omg10.com/4/8859017">BET NOW</a>
<button class="watch" onclick="unlock(this)">SEE</button>
</div>

</div>

</div>

<script>

function unlock(btn){

const card = btn.closest('.card');
const pred = card.querySelector('.pred');

btn.innerHTML="Loading...";

show_10317085().then(()=>{

setTimeout(()=>{
pred.style.display="block";
btn.style.display="none";
},2000);

});

}

window.onload=()=>{
document.querySelectorAll('.fill').forEach(bar=>{
setTimeout(()=>{
bar.style.width=bar.dataset.width;
},600);
});
}

</script>

</body>
  </html>
