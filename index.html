<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #0a0a23, #000);
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 20px;
}

.question-box {
  background: black;
  border: 2px solid #444;
  border-radius: 30px;
  padding: 20px;
  margin-bottom: 30px;
  font-size: 18px;
}

.answers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.answer {
  background: black;
  border: 2px solid #444;
  border-radius: 30px;
  padding: 15px;
  text-align: left;
  font-size: 16px;
  transition: 0.3s;
}

.answer span {
  color: gold;
  font-weight: bold;
  margin-right: 10px;
}

.answer:hover {
  background: gold;
  color: black;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">💰 Quiz Millionaire</div>

  <div class="question-box">
    Who was not a member of The Beatles?
  </div>

  <div class="answers">
    <div class="answer"><span>A</span> John Lennon</div>
    <div class="answer"><span>B</span> Ringo Starr</div>
    <div class="answer"><span>C</span> Justin Timberlake</div>
    <div class="answer"><span>D</span> Paul McCartney</div>
  </div>

</div>

</body>
</html>
