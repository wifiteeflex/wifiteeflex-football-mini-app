<div class="countdown-box">
  ⚽ Weekend Matches Countdown  
  <div id="countdown-timer">Loading...</div>
</div>

<style>
.countdown-box {
  background: #111;
  color: #fff;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  font-weight: 500;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

#countdown-timer {
  margin-top: 8px;
  font-size: 18px;
  font-weight: bold;
  color: #28a745;
}
</style>

<script>
function getNextWeekend() {
  let now = new Date();
  let day = now.getDay();

  // Days until Friday (5)
  let diff = 5 - day;
  if (diff < 0) diff += 7;

  let friday = new Date();
  friday.setDate(now.getDate() + diff);
  friday.setHours(18, 0, 0, 0); // ⏰ Friday 6PM

  return friday;
}

let targetDate = getNextWeekend();

function updateCountdown() {
  let now = new Date();
  let diff = targetDate - now;

  if (diff <= 0) {
    document.getElementById("countdown-timer").innerText = "🔥 Matches are LIVE!";
    return;
  }

  let days = Math.floor(diff / (1000 * 60 * 60 * 24));
  let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  let minutes = Math.floor((diff / (1000 * 60)) % 60);
  let seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown-timer").innerText =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s";
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>
