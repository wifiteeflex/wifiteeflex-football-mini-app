<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Football 🤖 Predictions</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Monetag SDK -->
<script src="//libtl.com/sdk.js"
  data-zone="10317085"
  data-sdk="show_10317085"></script>

<script>
(function(s){
  s.dataset.zone='10802441',
  s.src='https://izcle.com/vignette.min.js'
})(document.body.appendChild(document.createElement('script')))
</script>

<style>

/* GENERAL */
body{
  margin:0;
  background:#061f18;
  font-family:system-ui;
  color:#fff;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#014421,#065f46);
  padding:16px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  border-bottom:2px solid #facc15;
}

.powered{
  text-align:center;
  font-size:13px;
  color:#ffd166;
  animation:blink 2s infinite;
}

@keyframes blink{
  50%{opacity:0}
}

/* CONTAINER */
.container{
  padding:12px;
}

/* CARD */
.card{
  background:#022c22;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  border:1px solid #14532d;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
  position:relative;
}

/* HOT BADGE */
.hot{
  position:absolute;
  top:10px;
  right:10px;
  background:#ef4444;
  padding:4px 8px;
  font-size:11px;
  border-radius:6px;
  font-weight:bold;
}

/* MATCH */
.match{
  font-size:17px;
  font-weight:600;
  text-align:center;
}

.vs{
  color:#ef4444;
}

/* STATUS */
.status{
  text-align:center;
  margin-top:6px;
  font-size:13px;
}

.live{
  color:#ef4444;
}

.upcoming{
  color:#facc15;
}

.ended{
  color:#9ca3af;
}

/* LIVE DOT */
.live-dot{
  width:8px;
  height:8px;
  background:red;
  border-radius:50%;
  display:inline-block;
  animation:liveBlink 1s infinite;
}

@keyframes liveBlink{
  50%{opacity:0}
}

/* ODDS */
.odds{
  text-align:center;
  margin-top:6px;
  font-size:13px;
  color:#22c55e;
}

/* PROGRESS BAR */
.progress{
  margin-top:10px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
  height:8px;
}

.progress-bar{
  height:100%;
  background:#22c55e;
  width:0%;
  transition:1s;
}

/* PREDICTION */
.prediction{
  display:none;
  margin-top:10px;
  text-align:center;
  color:#facc15;
  font-weight:bold;
  font-size:18px;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.bet{
  flex:1;
  background:#16a34a;
  padding:10px;
  border-radius:8px;
  text-align:center;
  font-weight:bold;
  text-decoration:none;
}

.watch{
  flex:1;
  background:#facc15;
  color:#000;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

/* VIP */
.tag{
  display:inline-block;
  background:#7c3aed;
  padding:4px 8px;
  font-size:12px;
  border-radius:6px;
  margin-top:6px;
}

</style>
</head>

<body>

<header>AI Football 🤖 Predictions</header>
<div class="powered">Powered by AI Engine</div>

<div class="container">

<!-- MATCH CARD -->
<div class="card">

  <div class="hot">🔥 HOT</div>

  <div class="match">
    MAN CITY <span class="vs">VS</span> WEST HAM
  </div>

  <div class="status live">
    <span class="live-dot"></span> LIVE 65'
  </div>

  <div class="odds">💰 Estimated Odds: 2.45</div>

  <div class="progress">
    <div class="progress-bar" data-width="78%"></div>
  </div>

  <div class="prediction">HOME WIN (78%)</div>

  <div class="buttons">
    <a class="bet" href="https://omg10.com/4/8729428">BET NOW</a>
    <button class="watch" onclick="unlockPrediction(this)">SEE PREDICTION</button>
  </div>

</div>

<!-- SECOND CARD -->
<div class="card">

  <div class="match">
    REAL MADRID <span class="vs">VS</span> SEVILLA
  </div>

  <div class="status upcoming">UPCOMING</div>

  <div class="odds">💰 Estimated Odds: 1.95</div>

  <div class="progress">
    <div class="progress-bar" data-width="65%"></div>
  </div>

  <div class="prediction">HOME WIN (65%)</div>

  <div class="buttons">
    <a class="bet" href="https://omg10.com/4/7533041">BET NOW</a>
    <button class="watch" onclick="unlockPrediction(this)">SEE PREDICTION</button>
  </div>

</div>

<!-- VIP CARD -->
<div class="card">

  <div class="tag">VIP</div>

  <div class="match">
    TOTTENHAM <span class="vs">VS</span> LIVERPOOL
  </div>

  <div class="status upcoming">UPCOMING</div>

  <div class="odds">💰 Odds: 8.00</div>

  <div class="progress">
    <div class="progress-bar" data-width="55%"></div>
  </div>

  <div class="prediction">1 - 1</div>

  <div class="buttons">
    <a class="bet" href="https://otieu.com/4/7461922">BET NOW</a>
    <button class="watch" onclick="unlockPrediction(this)">UNLOCK</button>
  </div>

</div>

</div>

<script>

/* SHOW ADS + UNLOCK */
function unlockPrediction(btn){
  const card = btn.closest('.card');
  const pred = card.querySelector('.prediction');
  const bar = card.querySelector('.progress-bar');

  btn.disabled = true;
  btn.textContent = "LOADING AI...";

  show_10317085().then(()=>{
    btn.textContent = "Analyzing...";

    setTimeout(()=>{
      pred.style.display = "block";
      bar.style.width = bar.dataset.width;
      btn.style.display = "none";
    }, 4000);

  }).catch(()=>{
    alert("Ad failed. Try again.");
    btn.disabled = false;
    btn.textContent = "SEE PREDICTION";
  });
}

/* AUTO ANIMATE BARS */
window.onload = ()=>{
  document.querySelectorAll('.progress-bar').forEach(bar=>{
    setTimeout(()=>{
      bar.style.width = bar.dataset.width;
    },1000);
  });
}

</script>

</body>
  </html>
