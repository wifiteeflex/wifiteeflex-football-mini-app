<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Football 🤖 Predictions</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="//libtl.com/sdk.js" data-zone="10317085" data-sdk="show_10317085"></script>
<script>(function(s){s.dataset.zone='10802441',s.src='https://izcle.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0f17;
        color: #e0f2e9;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        max-width: 480px;
        margin: 0 auto;
    }

    header {
        background: #0f1a22;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #1f2a38;
    }

    .header-title {
        font-size: 21px;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .tabs {
        display: flex;
        background: #0f1a22;
        border-bottom: 1px solid #1f2a38;
        overflow-x: auto;
    }

    .tab {
        padding: 14px 18px;
        color: #94a3b8;
        font-weight: 600;
        white-space: nowrap;
    }

    .tab.active {
        color: white;
        border-bottom: 3px solid #00ff85;
    }

    .powered {
        background: #0f1a22;
        padding: 8px;
        text-align: center;
        color: #00ff85;
        font-size: 14.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }

    /* CARD */
    .card {
        background: #11191f;
        margin: 12px;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid #1f2a38;
    }

    .card-header {
        display: flex;
        align-items: center;
        padding: 10px 16px;
        background: #1a2530;
        font-size: 14px;
        font-weight: 600;
    }

    .live-badge {
        background: #ef4444;
        color: white;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
    }

    .hot-badge {
        background: #f97316;
        color: white;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        margin-left: auto;
    }

    .vip-badge {
        background: linear-gradient(90deg, #7c3aed, #a855f7);
        color: white;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
    }

    .match-body {
        padding: 20px 16px 16px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .team {
        text-align: center;
        width: 110px;
    }

    .team-logo {
        width: 62px;
        height: 62px;
        border-radius: 50%;
        margin: 0 auto 8px;
        background: #1f2a38;
        border: 2px solid #334155;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
    }

    .vs-container {
        position: absolute;
        left: 50%;
        top: 45px;
        transform: translateX(-50%);
        text-align: center;
        z-index: 10;
    }

    .vs {
        font-size: 18px;
        font-weight: bold;
        color: #64748b;
        background: #11191f;
        padding: 4px 14px;
        border-radius: 8px;
    }

    .odds {
        background: #1f2a38;
        color: white;
        padding: 4px 12px;
        border-radius: 8px;
        font-size: 14px;
        margin-top: 6px;
    }

    .confidence {
        padding: 0 16px 16px;
    }

    .confidence-label {
        display: flex;
        justify-content: space-between;
        font-size: 13.5px;
        margin-bottom: 6px;
    }

    .progress-bar-bg {
        height: 7px;
        background: #1f2a38;
        border-radius: 999px;
        overflow: hidden;
    }

    .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #00ff85, #22c55e);
        border-radius: 999px;
    }

    .buttons {
        display: flex;
        gap: 10px;
        padding: 0 16px 16px;
    }

    .btn {
        flex: 1;
        padding: 15px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 15.5px;
        text-align: center;
        cursor: pointer;
    }

    .btn-bet {
        background: #00ff85;
        color: #000;
    }

    .btn-prediction {
        background: #eab308;
        color: #000;
    }

    .prediction-box {
        background: #052e16;
        padding: 14px 16px;
        color: #00ff85;
        font-weight: 700;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid #1f2a38;
    }
</style>
</head>

<body>

<header>
    <i class="fas fa-bars" style="font-size:24px"></i>
    <div class="header-title">AI Football 🤖 Predictions</div>
    <i class="fas fa-bell" style="font-size:24px"></i>
</header>

<div class="powered">
    <span style="color:#00ff85">●</span> Powered by AI Engine
</div>

<div class="tabs">
    <div class="tab active">All Matches</div>
    <div class="tab">Live</div>
    <div class="tab">Upcoming</div>
    <div class="tab">VIP Picks</div>
</div>

<!-- Example Card 1 - LIVE -->
<div class="card">
    <div class="card-header">
        <span class="live-badge">LIVE</span>
        <span style="margin-left:10px">🇪🇸 La Liga</span>
        <span class="hot-badge">HOT</span>
    </div>

    <div class="match-body">
        <div class="team">
            <div class="team-logo">🏴</div>
            <div>Real Sociedad</div>
        </div>
        
        <div class="vs-container">
            <div class="vs">VS</div>
            <div class="odds">Odds <strong>1.62</strong></div>
        </div>

        <div class="team">
            <div class="team-logo">🛡️</div>
            <div>Levante</div>
        </div>
    </div>

    <div class="confidence">
        <div class="confidence-label">
            <span>AI Confidence</span>
            <span><strong>65%</strong></span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar" style="width:65%"></div>
        </div>
    </div>

    <div class="buttons">
        <div class="btn btn-bet">↗ BET NOW</div>
        <div class="btn btn-prediction" onclick="unlockPrediction(this)">🔒 SEE PREDICTION</div>
    </div>
</div>

<!-- You can duplicate the card above and modify for other matches -->

<script>
function unlockPrediction(btn) {
    const card = btn.closest('.card');
    btn.textContent = "ANALYZING...";
    
    show_10317085().then(() => {
        setTimeout(() => {
            const predHTML = `
                <div class="prediction-box">
                    <span>🤖 AI PREDICTION</span>
                    <span>HOME WIN <strong>85%</strong></span>
                </div>
            `;
            card.insertAdjacentHTML('beforeend', predHTML);
            btn.style.display = 'none';
        }, 2200);
    });
}
</script>

</body>
                                        </html>
