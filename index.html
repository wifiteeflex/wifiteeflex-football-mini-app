<style>
  :root {
    --bg: #0a1f1a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: system-ui, -apple-system, sans-serif;
    color: #fff;
    padding-bottom: 20px;
  }

  header {
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #0a1f1a;
    border-bottom: 1px solid #14532d;
  }

  .tabs {
    display: flex;
    background: #112c26;
    margin: 10px 12px;
    border-radius: 9999px;
    padding: 4px;
    overflow-x: auto;
  }

  .tab {
    padding: 10px 16px;
    border-radius: 9999px;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
  }

  .tab.active {
    background: #14532d;
    color: white;
  }

  .container { padding: 0 12px; }

  .card {
    background: #112c26;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    position: relative;
    border: 1px solid #1f3a32;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .league {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }

  .status {
    font-size: 13px;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .live { background: #ef4444; }
  .upcoming { background: #eab308; color: black; }

  .hot {
    position: absolute;
    top: 12px;
    right: 12px;
    background: #ef4444;
    color: white;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .vip {
    position: absolute;
    top: 12px;
    left: 12px;
    background: #7c3aed;
    color: white;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .match-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 12px 0;
  }

  .team {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 33%;
  }

  .team-logo {
    width: 68px;
    height: 68px;
    object-fit: contain;
  }

  .team-name {
    font-size: 14px;
    margin-top: 8px;
    text-align: center;
    line-height: 1.2;
  }

  .center {
    text-align: center;
    position: relative;
    width: 34%;
  }

  .vs {
    font-size: 24px;
    font-weight: bold;
    color: #ef4444;
  }

  .odds {
    background: #1f3a32;
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin: 6px auto;
    display: inline-block;
  }

  .confidence {
    margin-top: 12px;
  }

  .confidence-bar-container {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .confidence-bar {
    flex: 1;
    height: 8px;
    background: #1f3a32;
    border-radius: 9999px;
    overflow: hidden;
  }

  .confidence-fill {
    height: 100%;
    background: #22c55e;
    width: 0%;
    transition: width 1.5s ease;
  }

  .confidence-percent {
    font-size: 15px;
    font-weight: 600;
    min-width: 42px;
  }

  .ai-prediction {
    background: #1a2f28;
    border-radius: 10px;
    padding: 10px 12px;
    margin: 12px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 15px;
  }

  .buttons {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  .bet-btn {
    flex: 1;
    background: #16a34a;
    color: white;
    padding: 14px;
    border-radius: 10px;
    text-align: center;
    font-weight: 700;
    text-decoration: none;
  }

  .predict-btn {
    flex: 1;
    background: #facc15;
    color: black;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-weight: 700;
  }
</style>

    <div class="confidence">
      <div class="confidence-bar-container">

    </div>
  </div>

  <!-- Add other cards similarly. Tell me if you want me to expand all of them. -->

</div>
