<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Football 🤖 Predictions</title>

data-zone="10317085"
data-sdk="show_10317085"></script>

<script>
(function(s){
s.dataset.zone='10802441',

.pop()
.appendChild(document.createElement('script')))
</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#03151f;
font-family:Arial,sans-serif;
color:#fff;
padding-bottom:100px;
}

/* HEADER */
header{
background:linear-gradient(180deg,#072435,#04131d);
padding:15px 14px 10px;
text-align:center;
position:sticky;
top:0;
z-index:999;
border-bottom:1px solid rgba(255,255,255,.06);
}

.logo-title{
font-size:20px;
font-weight:900;
}

.powered{
margin-top:4px;
font-size:12px;
color:#33ff88;
font-weight:700;
}

/* TABS */
.tabs{
display:flex;
overflow-x:auto;
gap:10px;
padding:12px;
background:#071c29;
border-bottom:1px solid rgba(255,255,255,.05);
}

.tabs::-webkit-scrollbar{
display:none;
}

.tab{
min-width:max-content;
padding:10px 15px;
border-radius:12px;
background:#102735;
font-size:13px;
font-weight:700;
cursor:pointer;
}

.tab.active{
background:#12d76f;
color:#000;
}

/* CONTAINER */
.container{
padding:10px;
}

/* CARD */
.card{
background:linear-gradient(180deg,#071824,#031018);
border-radius:18px;
margin-bottom:12px;
overflow:hidden;
border:1px solid rgba(0,255,120,.08);
}

/* TOP */
.card-top{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
}

.left-info{
display:flex;
align-items:center;
gap:8px;
font-size:12px;
font-weight:700;
}

.live-badge{
background:#ff3b3b;
padding:5px 10px;
border-radius:10px;
font-size:10px;
font-weight:900;
}

.upcoming-badge{
background:#ffcc00;
color:#000;
padding:5px 10px;
border-radius:10px;
font-size:10px;
font-weight:900;
}

.hot{
background:#ff7b00;
padding:5px 10px;
border-radius:10px;
font-size:10px;
font-weight:900;
}

/* MATCH AREA */
.match-area{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px 10px 12px;
}

/* TEAM */
.team{
width:34%;
text-align:center;
}

/* LOGO FIX */
.team-logo{
width:55px;
height:55px;
border-radius:50%;
background:#122636;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 6px;
overflow:hidden;
border:2px solid rgba(255,255,255,.05);
}

.team-logo img{
width:80%;
height:80%;
object-fit:contain;
}

.team-name{
font-size:13px;
font-weight:800;
}

/* CENTER */
.center{
width:30%;
text-align:center;
}

.minute{
font-size:14px;
color:#19ff82;
font-weight:900;
}

.vs{
font-size:28px;
font-weight:900;
margin:4px 0;
}

.odds-box{
background:#0f2230;
border-radius:12px;
padding:6px;
width:75px;
margin:auto;
border:1px solid rgba(255,255,255,.05);
}

.odds-box span{
font-size:10px;
color:#aaa;
}

.odds-box strong{
font-size:18px;
color:#19ff82;
}

/* CONFIDENCE */
.confidence-wrap{
padding:0 10px 10px;
}

.confidence-head{
display:flex;
justify-content:space-between;
font-size:12px;
font-weight:700;
margin-bottom:6px;
}

.percent{
color:#1dff89;
}

.progress{
height:8px;
background:#10212e;
border-radius:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff73,#1aff95);
transition:1.5s;
}

/* PREDICTION */
.prediction{
display:none;
margin:8px 10px;
background:#0b2e21;
border-radius:12px;
padding:10px;
text-align:center;
font-size:14px;
font-weight:900;
color:#ffd54a;
}

/* BUTTONS */
.buttons{
display:flex;
gap:8px;
padding:0 10px 10px;
}

.bet{
flex:1;
height:42px;
border-radius:10px;
background:linear-gradient(90deg,#0e8f39,#1ed760);
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
font-weight:900;
color:#fff;
text-decoration:none;
}

.watch{
flex:1;
height:42px;
border-radius:10px;
background:#ffcf0a;
font-size:13px;
font-weight:900;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<div class="logo-title">AI Football 🤖 Predictions</div>
<div class="powered">🟢 Powered by AI Engine</div>
</header>

<div class="tabs">
<div class="tab active">All</div>
<div class="tab">Live</div>
<div class="tab">Upcoming</div>
<div class="tab">VIP</div>
</div>

<div class="container">

<!-- CARD 1 -->
<div class="card">

<div class="card-top">
<div class="left-info">
<div class="live-badge">LIVE</div>
<div>La Liga</div>
</div>
<div class="hot">🔥 HOT</div>
</div>

<div class="match-area">

<div class="team">
<div class="team-logo">
<img src="https://upload.wikimedia.org/wikipedia/en/8/81/Real_Sociedad_logo.svg">
</div>
<div class="team-name">Real Sociedad</div>
</div>

<div class="center">
<div class="minute">15'</div>
<div class="vs">VS</div>
<div class="odds-box">
<span>Odds</span>
<strong>1.62</strong>
</div>
</div>

<div class="team">
<div class="team-logo">
<img src="https://upload.wikimedia.org/wikipedia/en/6/6a/Levante_UD_logo.svg">
</div>
<div class="team-name">Levante</div>
</div>

</div>

<div class="confidence-wrap">
<div class="confidence-head">
<span>AI Confidence</span>
<span class="percent">65%</span>
</div>
<div class="progress">
<div class="progress-bar" data-width="65%"></div>
</div>
</div>

<div class="prediction">HOME WIN (85%)</div>

<div class="buttons">
<a class="bet" href="https://omg10.com/4/8859017">BET NOW</a>
<button class="watch" onclick="unlockPrediction(this)">SEE</button>
</div>

</div>

<!-- CARD 2 -->
<div class="card">

<div class="card-top">
<div class="left-info">
<div class="upcoming-badge">UPCOMING</div>
<div>La Liga</div>
</div>
</div>

<div class="match-area">

<div class="team">
<div class="team-logo">
<img src="https://upload.wikimedia.org/wikipedia/en/7/70/RCD_Mallorca_logo.svg">
</div>
<div class="team-name">Mallorca</div>
</div>

<div class="center">
<div class="vs">VS</div>
<div class="odds-box">
<span>Odds</span>
<strong>1.60</strong>
</div>
</div>

<div class="team">
<div class="team-logo">
<img src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg">
</div>
<div class="team-name">Real Madrid</div>
</div>

</div>

<div class="confidence-wrap">
<div class="confidence-head">
<span>AI Confidence</span>
<span class="percent">62%</span>
</div>
<div class="progress">
<div class="progress-bar" data-width="62%"></div>
</div>
</div>

<div class="prediction">AWAY OVER 1.5 (100%)</div>

<div class="buttons">
<a class="bet" href="https://omg10.com/4/8859017">BET NOW</a>
<button class="watch" onclick="unlockPrediction(this)">SEE</button>
</div>

</div>

</div>

<script>

function unlockPrediction(btn){
const card = btn.closest('.card');
const pred = card.querySelector('.prediction');

btn.disabled = true;
btn.innerHTML = "LOADING...";

show_10317085().then(()=>{

setTimeout(()=>{
pred.style.display = "block";
btn.style.display = "none";
},2000);

});

}

window.onload=()=>{
document.querySelectorAll('.progress-bar').forEach(bar=>{
setTimeout(()=>{
bar.style.width = bar.dataset.width;
},500);
});
}

</script>

</body>
  </html>
