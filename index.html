<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Millionaire 💰</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #0a0a23, #000);
  color: white;
  text-align: center;
}

.container { padding: 20px; max-width: 500px; margin: auto; }

.top-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
.question-box { background: black; border: 2px solid #444; border-radius: 30px; padding: 20px; margin-bottom: 30px; font-size: 18px; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
.answers { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.answer { background: black; border: 2px solid #444; border-radius: 30px; padding: 15px; text-align: left; font-size: 16px; transition: 0.3s; }
.answer span { color: gold; font-weight: bold; margin-right: 10px; }
.answer:hover { background: gold; color: black; cursor: pointer; box-shadow: 0 0 15px gold; }
.button { margin-top: 15px; padding: 10px 20px; border: none; background: #00c853; color: black; border-radius: 10px; font-weight: bold; cursor: pointer; }
.card { background: #1c1c1c; padding: 15px; border-radius: 15px; margin: 15px 0; text-align: left; }
input { padding: 10px; border-radius: 10px; border: 1px solid #444; width: 100%; margin-top: 10px; margin-bottom: 10px; }
#message { margin-top: 20px; font-weight: bold; }
</style>
</head>
<body>

<div class="container">

  <div class="top-bar">
    <div>💰 Coins: <span id="coins">0</span></div>
    <div>Question: <span id="qnum">1</span></div>
  </div>

  <div class="question-box" id="question">Loading...</div>

  <div class="answers" id="answers"></div>

  <div id="message"></div>
  <button id="continueBtn" class="button" style="display:none;">Continue</button>

  <!-- WITHDRAWAL SYSTEM -->
  <div class="card">
    <h3>💸 Withdraw</h3>
    <p>Your Coins: <span id="withdrawCoins">0</span></p>
    <input type="text" id="account" placeholder="Enter account / wallet">
    <button class="button" onclick="withdraw()">Withdraw</button>
  </div>

  <!-- REFERRAL SYSTEM -->
  <div class="card">
    <h3>👥 Invite & Earn</h3>
    <p>Your referral link:</p>
    <input type="text" id="refLink" readonly>
  </div>

</div>

<script>
// -------------------- CONFIG --------------------
let coins = 0;
let answered = 0;
let current = 0;

// Unique user ID for referral tracking
let userId = Math.floor(Math.random() * 1000000);
document.getElementById("refLink").value = "https://t.me/YOUR_BOT?start=" + userId;

// -------------------- QUESTIONS --------------------
const questions = [
  { q:"Who was not a member of The Beatles?", options:["John Lennon","Ringo Starr","Justin Timberlake","Paul McCartney"], answer:2 },
  { q:"Capital of France?", options:["Berlin","Madrid","Paris","Rome"], answer:2 },
  { q:"2 + 2 = ?", options:["3","4","5","6"], answer:1 },
  { q:"Which planet is known as the Red Planet?", options:["Earth","Venus","Mars","Jupiter"], answer:2 },
  { q:"Largest ocean?", options:["Atlantic","Indian","Pacific","Arctic"], answer:2 }
];

// -------------------- LOAD QUESTION --------------------
function loadQuestion() {
  document.getElementById("message").innerHTML = "";
  document.getElementById("continueBtn").style.display = "none";
  let q = questions[current];
  document.getElementById("question").innerText = q.q;
  document.getElementById("qnum").innerText = current + 1;
  document.getElementById("withdrawCoins").innerText = coins;

  let answersHTML = "";
  q.options.forEach((opt, index) => {
    answersHTML += `<div class="answer" onclick="checkAnswer(${index})">
      <span>${String.fromCharCode(65 + index)}</span> ${opt}</div>`;
  });
  document.getElementById("answers").innerHTML = answersHTML;
}

// -------------------- CHECK ANSWER --------------------
function checkAnswer(selected) {
  let q = questions[current];

  if(selected === q.answer){
    coins += 10; // +10 coins per correct
    document.getElementById("coins").innerText = coins;
    document.getElementById("message").innerHTML = "✅ Correct! +10 coins";
  } else {
    document.getElementById("message").innerHTML = "❌ Wrong! <br><button class='button' onclick='watchAd()'>Watch Ad to Continue</button>";
    return;
  }

  answered++;
  // SHOW AD EVERY 5 QUESTIONS
  if(answered % 5 === 0){
    showAd();
  }

  document.getElementById("continueBtn").style.display = "inline-block";
}

// -------------------- CONTINUE BUTTON --------------------
document.getElementById("continueBtn").onclick = () => {
  current++;
  if(current >= questions.length){ current = 0; } // restart quiz
  loadQuestion();
}

// -------------------- MONETAG ADS --------------------
// Replace these links with your Monetag direct links
const adLinks = [
  "https://your-monetag-link-1.com",
  "https://your-monetag-link-2.com",
  "https://your-monetag-link-3.com"
];
function getAdLink(){ return adLinks[Math.floor(Math.random() * adLinks.length)]; }

function showAd(){
  window.open(getAdLink(), "_blank");
}
function watchAd(){
  window.open(getAdLink(), "_blank");
  setTimeout(()=>{ loadQuestion(); },3000);
}

// -------------------- WITHDRAWAL SYSTEM --------------------
function withdraw(){
  let userCoins = coins;
  if(userCoins < 5000){ alert("Minimum withdrawal is 5000 coins"); return; }
  let account = document.getElementById("account").value;
  if(!account){ alert("Enter your payment details"); return; }
  alert(`Withdrawal request sent!\nCoins: ${userCoins}\nAccount: ${account}`);
  coins = 0;
  document.getElementById("coins").innerText = coins;
  document.getElementById("withdrawCoins").innerText = coins;
}

// -------------------- START --------------------
loadQuestion();
</script>
</body>
      </html>
